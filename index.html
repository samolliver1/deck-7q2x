<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes"><title>Prep</title>
<style>
:root{--sage:#4a5d4f;--sage2:#6f8a76;--bg:#1c211d;--card:#262d27;--ink:#eef1ee;--mut:#9fb0a4}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.wrap{max-width:620px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column}
.gate{flex:1;display:flex;flex-direction:column;justify-content:center;gap:14px;text-align:center}
.gate h1{font-size:20px;color:var(--sage2);margin:0}
input{font-size:18px;padding:14px;border-radius:12px;border:1px solid #3a463c;background:#20251f;color:var(--ink);text-align:center}
button{font-size:17px;padding:14px 18px;border-radius:12px;border:none;background:var(--sage);color:#fff;font-weight:600;cursor:pointer}
button.alt{background:#333b34}button:active{transform:translateY(1px)}
.err{color:#e08a7a;font-size:14px;min-height:18px}
.top{display:flex;justify-content:space-between;gap:10px;margin-bottom:10px;font-size:13px;color:var(--mut)}
.bar{height:8px;background:#2c342d;border-radius:6px;overflow:hidden;margin-bottom:14px}
.fill{height:100%;background:linear-gradient(90deg,var(--sage),var(--sage2));width:0;transition:width .3s}
.card{background:var(--card);border:1px solid #344036;border-radius:18px;padding:22px;flex:1;display:flex;flex-direction:column;justify-content:center;min-height:46vh}
.qlabel{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--sage2);margin-bottom:10px}
.q{font-size:21px;font-weight:600;line-height:1.35}
.a{font-size:17px;line-height:1.5;color:#dbe4dc;margin-top:18px;border-top:1px solid #344036;padding-top:16px}
.hide{display:none}.controls{display:flex;gap:10px;margin-top:14px}.controls button{flex:1}
.miss{background:#5a3b3b}.good{background:var(--sage)}.reveal{width:100%;background:var(--sage2)}
.done{text-align:center;padding:40px 10px}.done h2{color:var(--sage2)}
.foot{margin-top:14px;display:flex;gap:10px}.foot button{flex:1;font-size:14px;padding:11px}
</style></head>
<body><div class="wrap" id="wrap">
  <div class="gate" id="gate"><h1>EAX prep &mdash; locked</h1>
    <input id="pw" type="password" placeholder="password" autocomplete="off" autocapitalize="off">
    <button onclick="unlock()">Unlock</button><div class="err" id="err"></div></div>
</div>

var cards=[],order=[],pos=0,streak={},KEY="eax_streak_v2";
function b2u(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0)});}
async function decrypt(pw){
  var km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b2u(SALT),iterations:150000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2u(IV)},key,b2u(CT));
  return JSON.parse(new TextDecoder().decode(pt));
}
async function unlock(){
  var pw=document.getElementById("pw").value.trim();
  try{ cards=await decrypt(pw); if(!Array.isArray(cards)||!cards.length) throw 0; }
  catch(e){ document.getElementById("err").textContent="Wrong password"; return; }
  try{ streak=JSON.parse(localStorage.getItem(KEY))||{}; }catch(e){ streak={}; }
  start();
}
function masteredCount(){var n=0;for(var i=0;i<cards.length;i++)if((streak[i]||0)>=2)n++;return n;}
function buildQueue(){order=[];for(var i=0;i<cards.length;i++)if((streak[i]||0)<2)order.push(i);
  for(var k=order.length-1;k>0;k--){var r=Math.floor(Math.random()*(k+1));var t=order[k];order[k]=order[r];order[r]=t;}pos=0;}
function save(){try{localStorage.setItem(KEY,JSON.stringify(streak));}catch(e){}}
function start(){buildQueue();render();}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function render(){
  var w=document.getElementById("wrap"),total=cards.length,mast=masteredCount();
  if(pos>=order.length){
    w.innerHTML='<div class="done"><h2>Done &mdash; all '+total+' mastered.</h2><p style="color:#9fb0a4">Run it again later to lock it in.</p>'+
      '<div class="foot"><button class="alt" onclick="resetAll()">Reset progress</button><button onclick="start()">Review all again</button></div></div>';return;}
  var idx=order[pos],c=cards[idx];
  w.innerHTML='<div class="top"><span>'+mast+' / '+total+' mastered</span><span>'+(order.length-pos)+' left this round</span></div>'+
    '<div class="bar"><div class="fill" style="width:'+(mast/total*100)+'%"></div></div>'+
    '<div class="card"><div class="qlabel">Question '+(pos+1)+'</div><div class="q">'+esc(c[0])+'</div><div class="a hide" id="ans">'+esc(c[1])+'</div></div>'+
    '<div id="rev"><button class="reveal" onclick="reveal()">Show answer</button></div>'+
    '<div class="controls hide" id="ctr"><button class="miss" onclick="rate(0)">Missed</button><button class="good" onclick="rate(1)">Got it</button></div>'+
    '<div class="foot"><button class="alt" onclick="resetAll()">Reset</button></div>';
}
function reveal(){document.getElementById("ans").classList.remove("hide");document.getElementById("rev").classList.add("hide");document.getElementById("ctr").classList.remove("hide");}
function rate(ok){var idx=order[pos];streak[idx]=ok?((streak[idx]||0)+1):0;save();
  if(ok&&streak[idx]>=2){pos++;}else{var gap=ok?6:4,ins=Math.min(pos+gap,order.length);order.splice(pos,1);order.splice(ins-1,0,idx);}render();}
function resetAll(){if(confirm("Reset all progress?")){streak={};save();start();}}
document.getElementById("pw").addEventListener("keydown",function(e){if(e.key==="Enter")unlock();});
</script></body></html>
