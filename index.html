<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes"><title>Prep</title>
<style>
:root{--sage:#4a5d4f;--sage2:#6f8a76;--bg:#1c211d;--card:#262d27;--ink:#eef1ee;--mut:#9fb0a4}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--ink)}
.wrap{max-width:640px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column}
.gate{flex:1;display:flex;flex-direction:column;justify-content:center;gap:14px;text-align:center}
.gate h1{font-size:20px;color:var(--sage2);margin:0}
input,textarea{font-size:17px;padding:13px;border-radius:12px;border:1px solid #3a463c;background:#20251f;color:var(--ink);width:100%;font-family:inherit}
input{text-align:center}textarea{min-height:90px;resize:vertical;line-height:1.4}
button{font-size:16px;padding:13px 16px;border-radius:12px;border:none;background:var(--sage);color:#fff;font-weight:600;cursor:pointer}
button.alt{background:#333b34}button.mic{background:#3a463c;font-size:14px;padding:9px 12px}button:active{transform:translateY(1px)}
.err{color:#e08a7a;font-size:14px;min-height:18px}
.top{display:flex;justify-content:space-between;gap:10px;margin-bottom:8px;font-size:13px;color:var(--mut)}
.bar{height:8px;background:#2c342d;border-radius:6px;overflow:hidden;margin-bottom:14px}
.fill{height:100%;background:linear-gradient(90deg,var(--sage),var(--sage2));width:0;transition:width .3s}
.qlabel{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--sage2);margin-bottom:8px}
.q{font-size:21px;font-weight:600;line-height:1.35;margin-bottom:14px}
.hint{font-size:13px;color:var(--mut);margin:4px 0 8px}
.row{display:flex;gap:8px;align-items:center;margin-top:8px}
.model{background:#222a23;border-left:3px solid var(--sage2);border-radius:10px;padding:14px;margin-top:14px}
.model .ml{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--sage2);margin-bottom:6px}
.model .mt{font-size:16px;line-height:1.5;color:#dbe4dc}
.hide{display:none}.controls{display:flex;gap:10px;margin-top:14px}.controls button{flex:1}
.miss{background:#5a3b3b}.good{background:var(--sage)}
.done{text-align:center;padding:40px 10px}.done h2{color:var(--sage2)}
.foot{margin-top:14px;display:flex;gap:10px}.foot button{flex:1;font-size:14px;padding:11px}
</style></head>
<body><div class="wrap" id="wrap">
  <div class="gate" id="gate"><h1>EAX prep &mdash; locked</h1>
    <input id="pw" type="password" placeholder="password" autocomplete="off" autocapitalize="off">
    <button onclick="unlock()">Unlock</button><div class="err" id="err"></div></div>
</div>

var cards=[],order=[],pos=0,streak={},KEY="eax_gen_v1",rec=null,recOn=false;
function b2u(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0)});}
async function decrypt(pw){var km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
 var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b2u(SALT),iterations:150000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
 var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2u(IV)},key,b2u(CT));return JSON.parse(new TextDecoder().decode(pt));}
async function unlock(){var pw=document.getElementById("pw").value.trim();
 try{cards=await decrypt(pw);if(!Array.isArray(cards)||!cards.length)throw 0;}catch(e){document.getElementById("err").textContent="Wrong password";return;}
 try{streak=JSON.parse(localStorage.getItem(KEY))||{};}catch(e){streak={};}start();}
function masteredCount(){var n=0;for(var i=0;i<cards.length;i++)if((streak[i]||0)>=2)n++;return n;}
function buildQueue(){order=[];for(var i=0;i<cards.length;i++)if((streak[i]||0)<2)order.push(i);
 for(var k=order.length-1;k>0;k--){var r=Math.floor(Math.random()*(k+1));var t=order[k];order[k]=order[r];order[r]=t;}pos=0;}
function save(){try{localStorage.setItem(KEY,JSON.stringify(streak));}catch(e){}}
function start(){buildQueue();render();}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function speechOK(){return !!(window.SpeechRecognition||window.webkitSpeechRecognition);}
function render(){var w=document.getElementById("wrap"),total=cards.length,mast=masteredCount();
 if(pos>=order.length){w.innerHTML='<div class="done"><h2>Done &mdash; all '+total+' answered well.</h2><p style="color:#9fb0a4">Run it again later to lock it in deeper.</p><div class="foot"><button class="alt" onclick="resetAll()">Reset</button><button onclick="start()">Go again</button></div></div>';return;}
 var idx=order[pos],c=cards[idx];
 var mic=speechOK()?'<button class="mic" id="micBtn" onclick="toggleMic()">🎤 Speak it</button>':'';
 w.innerHTML='<div class="top"><span>'+mast+' / '+total+' nailed</span><span>'+(order.length-pos)+' left</span></div>'+
  '<div class="bar"><div class="fill" style="width:'+(mast/total*100)+'%"></div></div>'+
  '<div class="qlabel">Question '+(pos+1)+'</div><div class="q">'+esc(c[0])+'</div>'+
  '<div class="hint">Answer it OUT LOUD now (best), or type it. Then check yourself against the model.</div>'+
  '<textarea id="mine" placeholder="Say it out loud... or jot the gist here"></textarea>'+
  '<div class="row">'+mic+'</div>'+
  '<div style="margin-top:12px"><button style="width:100%" class="good" onclick="reveal()">I&rsquo;ve answered &mdash; show the model</button></div>'+
  '<div id="after" class="hide"><div class="model"><div class="ml">Model answer</div><div class="mt">'+esc(c[1])+'</div></div>'+
   '<div class="hint">Did you cover the main points?</div>'+
   '<div class="controls"><button class="miss" onclick="rate(0)">Missed bits</button><button class="good" onclick="rate(1)">Nailed it</button></div></div>'+
  '<div class="foot"><button class="alt" onclick="resetAll()">Reset</button></div>';}
function reveal(){stopMic();document.getElementById("after").classList.remove("hide");
 document.getElementById("after").scrollIntoView({behavior:"smooth",block:"center"});}
function rate(ok){var idx=order[pos];streak[idx]=ok?((streak[idx]||0)+1):0;save();
 if(ok&&streak[idx]>=2){pos++;}else{var gap=ok?6:4,ins=Math.min(pos+gap,order.length);order.splice(pos,1);order.splice(ins-1,0,idx);}render();}
function toggleMic(){if(recOn){stopMic();return;}
 var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;
 rec=new SR();rec.lang="en-GB";rec.interimResults=true;rec.continuous=true;var base=document.getElementById("mine").value;
 rec.onresult=function(e){var t="";for(var i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;
  document.getElementById("mine").value=(base?base+" ":"")+t;};
 rec.onerror=function(){stopMic();};rec.onend=function(){recOn=false;var b=document.getElementById("micBtn");if(b)b.textContent="🎤 Speak it";};
 try{rec.start();recOn=true;var b=document.getElementById("micBtn");if(b)b.textContent="● Listening… tap to stop";}catch(e){}}
function stopMic(){if(rec){try{rec.stop();}catch(e){}}recOn=false;}
function resetAll(){if(confirm("Reset all progress?")){streak={};save();start();}}
document.getElementById("pw").addEventListener("keydown",function(e){if(e.key==="Enter")unlock();});
</script></body></html>
